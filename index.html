<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<title>Você me ama mesmo?</title>

<style>

body{
background:#ff7a7a;
font-family:Arial;
text-align:center;
padding-top:100px;
}

button{
padding:15px;
font-size:18px;
border:none;
border-radius:8px;
margin:10px;
cursor:pointer;
}

#nao{
position:absolute;
}

</style>
</head>

<body>

<h1>Você me ama? 😢</h1>

<button onclick="sim()">SIM</button>
<button id="nao" onmouseover="fugir()">NÃO</button>

<script>

function sim(){
alert("Eu sabia que você não ia resistir ao meu charme gatinha ❤️")
window.location="https://music.youtube.com/watch?v=izGwDsrQ1eQ";
}

function fugir(){

let botao=document.getElementById("nao")

let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight

botao.style.left=x+"px"
botao.style.top=y+"px"

}

</script>

</body>
</html>
